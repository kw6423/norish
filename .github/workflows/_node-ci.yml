name: Reusable Node CI

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: QmFzZTY0RW5jb2RlZE1hc3RlcktleU1pbjMyQ2hhcnM=
  SKIP_ENV_VALIDATION: "1"
  AUTH_URL: http://localhost:3000
  CHROME_WS_ENDPOINT: ws://localhost:3000

on:
  workflow_call:
    inputs:
      run-build:
        required: false
        type: boolean
        default: false
      run-tests:
        required: false
        type: boolean
        default: false
      run-lint:
        required: false
        type: boolean
        default: false
      run-format:
        required: false
        type: boolean
        default: false
      run-i18n:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    if: ${{ inputs.run-build || inputs.run-tests || inputs.run-lint || inputs.run-format || inputs.run-i18n }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

  build:
    name: Build
    if: ${{ inputs.run-build || inputs.run-tests || inputs.run-lint || inputs.run-format || inputs.run-i18n }}
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run build
        run: pnpm run build

  tests:
    name: Tests
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run tests
        run: pnpm run test

  lint:
    name: Lint
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run lint
        run: pnpm run lint

  format:
    name: Format Check
    if: ${{ inputs.run-format }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run format check
        run: pnpm run format

  i18n:
    name: Locale Keys Check
    if: ${{ inputs.run-i18n }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Check locale keys
        run: pnpm run i18n:check
