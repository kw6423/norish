name: PR Quality Checks

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: QmFzZTY0RW5jb2RlZE1hc3RlcktleU1pbjMyQ2hhcnM=
  SKIP_ENV_VALIDATION: "1"
  AUTH_URL: http://localhost:3000
  CHROME_WS_ENDPOINT: ws://localhost:3000

on:
  pull_request:
    branches:
      - main
      - "rc/**"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-cycles:
    name: Dependency Cycles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run circular dependency gate
        run: pnpm run deps:cycles

  quality:
    name: Quality Checks
    uses: ./.github/workflows/_node-ci.yml
    with:
      run-build: true
      run-tests: true
      run-lint: true
      run-format: true
      run-i18n: true
