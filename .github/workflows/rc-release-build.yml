name: RC Release Build and Publish Docker

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: test-master-key
  SKIP_ENV_VALIDATION: "1"

on:
  push:
    branches:
      - "rc/**"

concurrency:
  group: release-rc
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  prepare-release:
    name: RC Beta Release Prep
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute_tag.outputs.tag }}
      image_tags: ${{ steps.image_tags.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version contains beta suffix
        run: |
          VERSION="${{ steps.read_version.outputs.version }}"
          if [[ "$VERSION" != *-beta* ]]; then
            echo "::error::RC branch version '$VERSION' must contain '-beta' suffix"
            exit 1
          fi

      - name: Compute tag name
        id: compute_tag
        run: |
          TAG="rc-v${{ steps.read_version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null; then
            echo "Tag $TAG already exists on origin; skipping tag creation"
            exit 0
          fi
          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Set image tags
        id: image_tags
        run: |
          {
            echo 'value<<EOF'
            echo 'ghcr.io/norish-recipes/norish:${{ steps.compute_tag.outputs.tag }}'
            echo 'docker.io/norishapp/norish:${{ steps.compute_tag.outputs.tag }}'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  docker-publish:
    uses: ./.github/workflows/_docker-build.yml
    needs: prepare-release
    secrets: inherit
    with:
      push: true
      image-tags: ${{ needs.prepare-release.outputs.image_tags }}
