name: Release Tag and Promote Docker

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: test-master-key
  SKIP_ENV_VALIDATION: "1"

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  quality:
    name: Release Quality Checks
    uses: ./.github/workflows/_node-ci.yml
    with:
      run-build: true
      run-tests: true

  prepare-release:
    name: Release Prep
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      tag: ${{ steps.compute_tag.outputs.tag }}
      rc_tag: ${{ steps.compute_rc_tag.outputs.tag }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute tag name
        id: compute_tag
        run: |
          TAG="v${{ steps.read_version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Compute RC tag name
        id: compute_rc_tag
        run: |
          TAG="rc-v${{ steps.read_version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null; then
            echo "Tag $TAG already exists on origin; skipping tag creation"
            exit 0
          fi
          git tag "$TAG"
          git push origin "refs/tags/$TAG"

  docker-promote:
    name: Promote RC Docker Images
    runs-on: ubuntu-latest
    needs: prepare-release
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Promote GitHub Container Registry image
        run: |
          SOURCE="ghcr.io/norish-recipes/norish:${{ needs.prepare-release.outputs.rc_tag }}"
          VERSION_TAG="ghcr.io/norish-recipes/norish:${{ needs.prepare-release.outputs.tag }}"
          docker buildx imagetools create \
            --tag "$VERSION_TAG" \
            --tag "ghcr.io/norish-recipes/norish:latest" \
            "$SOURCE"

      - name: Promote Docker Hub image
        run: |
          SOURCE="docker.io/norishapp/norish:${{ needs.prepare-release.outputs.rc_tag }}"
          VERSION_TAG="docker.io/norishapp/norish:${{ needs.prepare-release.outputs.tag }}"
          docker buildx imagetools create \
            --tag "$VERSION_TAG" \
            --tag "docker.io/norishapp/norish:latest" \
            "$SOURCE"
